services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB:       flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
