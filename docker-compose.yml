services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB:       flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: flowforge
      MYSQL_DATABASE:      flowforge
      MYSQL_USER:          flowforge
      MYSQL_PASSWORD:      flowforge
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flowforge", "-pflowforge"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  mysql_data:
