name: CI

on:
  push:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint — runs first, fast feedback
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check flowsmith/ tests/

      - name: Run mypy
        run: mypy flowsmith/

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests — no database, runs in seconds
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests — spins up real Postgres + MySQL as services
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     flowsmith
          POSTGRES_PASSWORD: flowsmith
          POSTGRES_DB:       flowsmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowsmith"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: flowsmith
          MYSQL_DATABASE:      flowsmith
          MYSQL_USER:          flowsmith
          MYSQL_PASSWORD:      flowsmith
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u flowsmith -pflowsmith"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Postgres migrations
        run: flowsmith migrate --url postgresql://flowsmith:flowsmith@localhost/flowsmith

      - name: Run MySQL migrations
        run: flowsmith migrate --url mysql://flowsmith:flowsmith@localhost/flowsmith

      - name: Run integration tests (Postgres)
        env:
          DATABASE_URL: postgresql://flowsmith:flowsmith@localhost/flowsmith
        run: pytest tests/integration/test_postgres_storage.py -v --tb=short -m integration

      - name: Run integration tests (MySQL)
        env:
          MYSQL_URL: mysql://flowsmith:flowsmith@localhost/flowsmith
        run: pytest tests/integration/test_mysql_storage.py -v --tb=short -m integration

  # ---------------------------------------------------------------------------
  # Job 4: Smoke tests — full end-to-end scenarios against real databases
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: integration-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     flowsmith
          POSTGRES_PASSWORD: flowsmith
          POSTGRES_DB:       flowsmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowsmith"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: flowsmith
          MYSQL_DATABASE:      flowsmith
          MYSQL_USER:          flowsmith
          MYSQL_PASSWORD:      flowsmith
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u flowsmith -pflowsmith"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Postgres migrations
        run: flowsmith migrate --url postgresql://flowsmith:flowsmith@localhost/flowsmith

      - name: Run MySQL migrations
        run: flowsmith migrate --url mysql://flowsmith:flowsmith@localhost/flowsmith

      - name: Run smoke tests
        env:
          DATABASE_URL: postgresql://flowsmith:flowsmith@localhost/flowsmith
          MYSQL_URL: mysql://flowsmith:flowsmith@localhost/flowsmith
        run: python smoke_test.py